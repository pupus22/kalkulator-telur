name: Build APK from ZIP

on:
  workflow_dispatch:
  push:
    paths:
      - "kalkulator-telur-github-ready.zip"
      - ".github/workflows/build-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip Android project
        run: |
          rm -rf project
          mkdir project
          unzip -o kalkulator-telur-github-ready.zip -d project
          ls -la project

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: project
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KalkulatorTelur-debug-apk
          path: project/app/build/outputs/apk/debug/app-debug.apk
